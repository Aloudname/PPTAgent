# 文environment.yml
# 用途: Conda env description
# Run by conda env create -f environment.yml -n pptagent
#       or mamba env create -f environment.yml -n pptagent
# Update: conda env update -f environment.yml -n pptagent --prune
# Export:  conda env export -n pptagent > environment-lock.yml

name: pptagent

channels:
  - conda-forge
  - defaults

dependencies:

  - python=3.11.9
  - pip

  - cmake
  - pkg-config

  - libjpeg-turbo
  - libpng
  - libtiff
  - libwebp
  - openjpeg
