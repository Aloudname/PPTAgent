site_name: PPTAgent Documentation
site_description: PPT making agent for researchers.
site_author: Aloudname
repo_url: https://github.com/Aloudname/PPTAgent

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: switch_dark_mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: switch_light_mode
  features:
    - navigation.sections
    - navigation.expand
    - search.highlight
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            show_source: true
            show_root_heading: true

nav:
  - Home: index.md
  - Architecture & Plan:
    - Project Plan: 0_plan.md
    - Phase 0 - Infrastructure: 1_infra.md
    - Phase 1 - Basic Operations: 2_basicOperations.md
    - Phase 3 - Element Editing: 3_elementEditing.md
    - Summary & Next Steps: 12_summary.md
  - API Reference:
    - pptagent.core: api/core.md
    - pptagent.tools: api/tools.md
